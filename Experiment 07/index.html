<!DOCTYPE html>
<html>
<head>
    <title>YouTube Link Example</title>
</head>
<body>
    <!-- Basic YouTube link -->
    <a href="https://youtube.com/shorts/-q6_wo6aowo?si=FrvbgSQC0moII48C">Watch on YouTube</a>

    <!-- Open YouTube link in a new tab -->

    <!-- Link inside a sentence -->

</body>
</html>
