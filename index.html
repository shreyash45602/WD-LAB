<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Practical Repository</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f172a, #1e293b);
            color:white;
            text-align:center;
        }

        h1{
            margin-top:30px;
            font-size:40px;
            color:#38bdf8;
        }

        p{
            font-size:18px;
            color:#cbd5e1;
        }

        .container{
            width:90%;
            margin:auto;
            margin-top:30px;
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap:20px;
        }

        .card{
            background:#1e293b;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.4);
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.05);
            background:#334155;
        }

        .card a{
            text-decoration:none;
            color:white;
            font-size:20px;
            font-weight:bold;
        }

        footer{
            margin-top:40px;
            padding:15px;
            background:#0f172a;
            color:#94a3b8;
        }
    </style>
</head>
<body>

    <h1>My GitHub Practical Repository</h1>
    <p>Welcome to my practical and experiment collection</p>
